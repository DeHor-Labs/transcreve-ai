version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - deps
      - deps/github-actions
    commit-message:
      prefix: chore(deps)
      include: scope
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - deps
      - deps/pip
    commit-message:
      prefix: chore(deps)
      include: scope
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "06:10"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - deps
      - deps/npm
      - frontend
    commit-message:
      prefix: chore(deps)
      include: scope
