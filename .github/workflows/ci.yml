name: CI

on:
  push:
    branches: [main, feat/plataforma-20260603]
  pull_request:
    branches: [main, feat/plataforma-20260603]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,obsidian,web,rag]
      - name: Ruff lint
        run: python -m ruff check video_kb tests
      - name: Ruff complexity gate (C90 - warning)
        run: |
          python -m ruff check --select C90 video_kb tests
        continue-on-error: true
      - name: MyPy typecheck (warning while project is stabilized)
        run: python -m mypy video_kb tests
        continue-on-error: true
      - name: Compile Python files
        run: python -m compileall video_kb tests
      - name: Smoke tests
        run: python -m pytest --maxfail=1 tests/smoke
      - name: Legacy unittest suite
        run: python -m unittest discover -s tests
      - name: Pytest with coverage
        run: |
          python -m pytest \
            --maxfail=1 \
            --cov=video_kb \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

  frontend:
    if: ${{ hashFiles('frontend/package.json') != '' }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Enable pnpm
        run: corepack enable
      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Frontend lint
        working-directory: frontend
        run: pnpm lint
      - name: Frontend build
        working-directory: frontend
        run: pnpm build
