name: CI

permissions:
  contents: read
  # Required by dorny/paths-filter to read PR metadata for changed-file filtering.
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
      github: ${{ steps.filter.outputs.github }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            python:
              - ".github/workflows/ci.yml"
              - "pyproject.toml"
              - "uv.lock"
              - "video_kb/**"
              - "tests/**"
            frontend:
              - ".github/workflows/ci.yml"
              - "frontend/**"
            github:
              - ".github/**"

  quality:
    name: Quality
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.github == 'true' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'coverage'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"
      - name: Install uv
        run: python -m pip install uv
      - name: Install package
        run: |
          uv sync --frozen --python 3.14 --extra dev --extra obsidian --extra web --extra rag
      - name: Ruff lint
        run: uv run --python 3.14 python -m ruff check video_kb tests
      - name: MyPy typecheck
        run: uv run --python 3.14 python -m mypy video_kb tests
      - name: Compile Python files
        run: uv run --python 3.14 python -m compileall video_kb tests

  python-tests:
    name: Python tests (${{ matrix.python-version }})
    needs: [changes, quality]
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.github == 'true' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'coverage'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr
      - name: Install uv
        run: python -m pip install uv
      - name: Install package
        run: |
          uv sync --frozen --python ${{ matrix.python-version }} --extra dev --extra obsidian --extra web --extra rag
      - name: Pytest
        run: uv run --python ${{ matrix.python-version }} python -m pytest tests

  coverage:
    name: Coverage
    needs: [changes, python-tests]
    if: >
      always() &&
      needs.python-tests.result == 'success' &&
      (github.event_name == 'workflow_dispatch' ||
       github.ref == 'refs/heads/main' ||
       needs.changes.outputs.github == 'true' ||
       (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'coverage')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr
      - name: Install uv
        run: python -m pip install uv
      - name: Install package
        run: |
          uv sync --frozen --python 3.14 --extra dev --extra obsidian --extra web --extra rag
      - name: Pytest with coverage
        run: |
          uv run --python 3.14 python -m pytest \
            --cov=video_kb \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.github == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: "10.34.1"
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Frontend lint
        working-directory: frontend
        run: pnpm lint
      - name: Frontend build
        working-directory: frontend
        run: pnpm build

  ci-gate:
    name: CI Gate
    needs:
      - changes
      - quality
      - python-tests
      - coverage
      - frontend
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Enforce required check completion
        env:
          CHANGED_PYTHON: ${{ needs.changes.outputs.python }}
          CHANGED_FRONTEND: ${{ needs.changes.outputs.frontend }}
          CHANGED_GITHUB: ${{ needs.changes.outputs.github }}
          COVERAGE_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'coverage') }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          PYTESTS_RESULT: ${{ needs.python-tests.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
        run: |
          set -euo pipefail

          quality_required=false
          python_tests_required=false
          coverage_required=false
          frontend_required=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            quality_required=true
            python_tests_required=true
            coverage_required=true
            frontend_required=true
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "$CHANGED_PYTHON" == "true" || "$CHANGED_GITHUB" == "true" ]]; then
              quality_required=true
              python_tests_required=true
            fi
            if [[ "$CHANGED_FRONTEND" == "true" || "$CHANGED_GITHUB" == "true" ]]; then
              frontend_required=true
            fi
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              coverage_required=true
            fi
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "$CHANGED_PYTHON" == "true" || "$CHANGED_GITHUB" == "true" ]]; then
              quality_required=true
              python_tests_required=true
            fi
            if [[ "$CHANGED_GITHUB" == "true" ]]; then
              coverage_required=true
            fi
            if [[ "$CHANGED_FRONTEND" == "true" || "$CHANGED_GITHUB" == "true" ]]; then
              frontend_required=true
            fi
            if [[ "$COVERAGE_LABEL" == "true" ]]; then
              quality_required=true
              python_tests_required=true
              coverage_required=true
            fi
          fi

          if [[ "$coverage_required" == "true" && "$PYTESTS_RESULT" != "success" ]]; then
            coverage_required=false
          fi

          if [[ "$CHANGED_GITHUB" == "true" ]]; then
            echo "Scoped change detected in .github/**; enforcing full safety checks."
          fi

          failure=0

          require_success() {
            local name="$1"
            local required="$2"
            local result="$3"
            if [[ "$required" == "true" && "$result" != "success" ]]; then
              echo "Required check failed: $name => $result"
              failure=1
            fi
          }

          require_success "quality" "$quality_required" "$QUALITY_RESULT"
          require_success "python-tests" "$python_tests_required" "$PYTESTS_RESULT"
          require_success "frontend" "$frontend_required" "$FRONTEND_RESULT"
          require_success "coverage" "$coverage_required" "$COVERAGE_RESULT"
          require_success "changes" "true" "$CHANGES_RESULT"

          if [[ "$quality_required" == "true" ]]; then
            echo "quality: required"
          else
            echo "quality: optional"
          fi
          if [[ "$python_tests_required" == "true" ]]; then
            echo "python-tests: required"
          else
            echo "python-tests: optional"
          fi
          if [[ "$frontend_required" == "true" ]]; then
            echo "frontend: required"
          else
            echo "frontend: optional"
          fi
          if [[ "$coverage_required" == "true" ]]; then
            echo "coverage: required"
          else
            echo "coverage: optional"
          fi

          if [[ "$failure" != 0 ]]; then
            echo "CI Gate FAILED."
            exit 1
          fi

          echo "CI Gate PASSED."
